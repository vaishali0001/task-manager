  function saveData() {
    localStorage.setItem('tf_data', JSON.stringify(state.data));
  }

  function hydrateProject(project) {
    if (!project) return null;
    const creator = state.data.users.find(u => u.id === project.createdById) || null;
    return { ...project, createdBy: creator ? { id: creator.id, name: creator.name, email: creator.email } : null };
  }

  function hydrateTask(task) {
    const project = state.data.projects.find(p => p.id === task.projectId) || null;
    const assignee = task.assignedToId ? state.data.users.find(u => u.id === task.assignedToId) : null;
    return {
      ...task,
      project: project ? { id: project.id, name: project.name } : null,
      assignedTo: assignee ? { id: assignee.id, name: assignee.name, email: assignee.email } : null,
    };
  }

  async function localApi(method, path, body) {
    const parts = path.replace(/^\/+/, '').split('/');
    const resource = parts[0];
    const resourceId = parts[1] ? parseInt(parts[1], 10) : null;

    if (resource === 'auth') {
      if (parts[1] === 'login' && method === 'POST') {
        const user = state.data.users.find(u => u.email === body.email && u.password === body.password);
        if (!user) throw new Error('Invalid email or password.');
        return { token: btoa(user.email), name: user.name, email: user.email, role: user.role };
      }
      if (parts[1] === 'register' && method === 'POST') {
        if (state.data.users.some(u => u.email === body.email)) throw new Error('Email already registered.');
        const newUser = { id: Math.max(0, ...state.data.users.map(u => u.id)) + 1, name: body.name, email: body.email, password: body.password, role: body.role || 'MEMBER' };
        state.data.users.push(newUser);
        saveData();
        return { token: btoa(newUser.email), name: newUser.name, email: newUser.email, role: newUser.role };
      }
    }

    if (resource === 'dashboard' && parts[1] === 'stats' && method === 'GET') {
      const projects = state.data.projects.length;
      const tasks = state.data.tasks.length;
      const completedTasks = state.data.tasks.filter(t => t.status === 'DONE').length;
      const inProgressTasks = state.data.tasks.filter(t => t.status === 'IN_PROGRESS').length;
      const overdueTasks = state.data.tasks.filter(t => t.dueDate && new Date(t.dueDate) < new Date() && t.status !== 'DONE').length;
      const totalMembers = state.data.users.length;
      return { totalProjects: projects, totalTasks: tasks, completedTasks, inProgressTasks, overdueTasks, totalMembers };
    }

    if (resource === 'projects') {
      if (method === 'GET' && !resourceId) {
        return state.data.projects.map(hydrateProject);
      }
      if (method === 'POST') {
        const newProject = { id: Math.max(0, ...state.data.projects.map(p => p.id)) + 1, name: body.name, description: body.description || '', createdById: state.data.users.find(u => u.email === state.user?.email)?.id || 1, createdAt: new Date().toISOString().split('T')[0] };
        state.data.projects.push(newProject);
        saveData();
        return hydrateProject(newProject);
      }
      if (resourceId && method === 'PUT') {
        const project = state.data.projects.find(p => p.id === resourceId);
        if (!project) throw new Error('Project not found.');
        project.name = body.name || project.name;
        project.description = body.description || project.description;
        saveData();
        return hydrateProject(project);
      }
      if (resourceId && method === 'DELETE') {
        state.data.projects = state.data.projects.filter(p => p.id !== resourceId);
        state.data.tasks = state.data.tasks.filter(t => t.projectId !== resourceId);
        saveData();
        return null;
      }
    }

    if (resource === 'tasks') {
      if (method === 'GET' && !resourceId) {
        return state.data.tasks.map(hydrateTask);
      }
      if (method === 'POST') {
        const newTask = {
          id: Math.max(0, ...state.data.tasks.map(t => t.id)) + 1,
          title: body.title,
          description: body.description || '',
          status: body.status || 'TODO',
          priority: body.priority || 'MEDIUM',
          dueDate: body.dueDate || null,
          projectId: body.projectId,
          assignedToId: body.assignedToId || null,
          createdAt: new Date().toISOString().split('T')[0]
        };
        state.data.tasks.push(newTask);
        saveData();
        return hydrateTask(newTask);
      }
      if (resourceId && method === 'PUT') {
        const task = state.data.tasks.find(t => t.id === resourceId);
        if (!task) throw new Error('Task not found.');
        if (body.title !== undefined) task.title = body.title;
        if (body.description !== undefined) task.description = body.description;
        if (body.status !== undefined) task.status = body.status;
        if (body.priority !== undefined) task.priority = body.priority;
        if (body.dueDate !== undefined) task.dueDate = body.dueDate;
        if (body.projectId !== undefined) task.projectId = body.projectId;
        if (body.assignedToId !== undefined) task.assignedToId = body.assignedToId || null;
        saveData();
        return hydrateTask(task);
      }
      if (resourceId && method === 'DELETE') {
        state.data.tasks = state.data.tasks.filter(t => t.id !== resourceId);
        saveData();
        return null;
      }
    }

    if (resource === 'users' && method === 'GET') {
      return state.data.users.map(u => ({ id: u.id, name: u.name, email: u.email, role: u.role }));
    }

    throw new Error('Unknown API route');
  }

  // ═══════════════════════════════════════════════════════ CALENDAR
  function renderCalendar() {
    const main = document.getElementById('main-content');
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();
    state._calYear = state._calYear ?? year;
    state._calMonth = state._calMonth ?? month;
    _drawCalendar(main);
  }

  function _drawCalendar(main) {
    const y = state._calYear;
    const m = state._calMonth;
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const todayStr = new Date().toISOString().split('T')[0];

    // Build task map keyed by date string
    const taskMap = {};
    (state.tasks || []).forEach(t => {
      if (t.dueDate) {
        if (!taskMap[t.dueDate]) taskMap[t.dueDate] = [];
        taskMap[t.dueDate].push(t);
      }
    });

    let cells = '';
    let dayCount = 1;
    for (let row = 0; row < 6; row++) {
      let rowHtml = '';
      for (let col = 0; col < 7; col++) {
        const cellIndex = row * 7 + col;
        if (cellIndex < firstDay || dayCount > daysInMonth) {
          rowHtml += `<td class="cal-cell cal-empty"></td>`;
        } else {
          const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(dayCount).padStart(2,'0')}`;
          const isToday = dateStr === todayStr;
          const dayTasks = taskMap[dateStr] || [];
          const dots = dayTasks.slice(0,3).map(t => {
            const color = t.priority === 'HIGH' ? '#ef4444' : t.priority === 'MEDIUM' ? '#f59e0b' : '#10b981';
            return `<span class="cal-dot" style="background:${color}" title="${esc(t.title)}"></span>`;
          }).join('');
          rowHtml += `<td class="cal-cell${isToday ? ' cal-today' : ''}" onclick="calDayClick('${dateStr}')">
            <div class="cal-day-num">${dayCount}</div>
            <div class="cal-dots">${dots}</div>
          </td>`;
          dayCount++;
        }
      }
      cells += `<tr>${rowHtml}</tr>`;
      if (dayCount > daysInMonth) break;
    }

    main.innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Calendar</div><div class="page-subtitle">View tasks by due date across the month.</div></div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="navigate('dashboard')"><i class="fas fa-arrow-left"></i> Dashboard</button>
        </div>
      </div>
      <div class="card" style="margin-bottom:24px;">
        <div class="card-header">
          <button class="btn btn-secondary btn-sm" onclick="calNav(-1)"><i class="fas fa-chevron-left"></i></button>
          <span class="card-title" style="margin:0 16px;">${monthNames[m]} ${y}</span>
          <button class="btn btn-secondary btn-sm" onclick="calNav(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="card-body" style="padding:0;">
          <table class="cal-table">
            <thead><tr>${dayNames.map(d => `<th class="cal-th">${d}</th>`).join('')}</tr></thead>
            <tbody>${cells}</tbody>
          </table>
        </div>
      </div>
      <div id="cal-day-panel"></div>
    `;
  }

  function calNav(dir) {
    state._calMonth += dir;
    if (state._calMonth > 11) { state._calMonth = 0; state._calYear++; }
    if (state._calMonth < 0)  { state._calMonth = 11; state._calYear--; }
    _drawCalendar(document.getElementById('main-content'));
  }

  function calDayClick(dateStr) {
    const tasks = (state.tasks || []).filter(t => t.dueDate === dateStr);
    const panel = document.getElementById('cal-day-panel');
    if (!panel) return;
    if (!tasks.length) {
      panel.innerHTML = `<div class="card"><div class="card-body"><div class="empty-state" style="padding:30px 20px;"><i class="fas fa-calendar-day"></i><p>No tasks due on ${dateStr}.</p></div></div></div>`;
      return;
    }
    panel.innerHTML = `<div class="card"><div class="card-header"><span class="card-title">Tasks due on ${dateStr}</span></div><div class="card-body"><div class="table-wrap">${taskTable(tasks, false)}</div></div></div>`;
  }

  // ═══════════════════════════════════════════════════════ REPORTS
  async function renderReports() {
    const main = document.getElementById('main-content');
    main.innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Reports</div><div class="page-subtitle">Visual overview of your team's progress and workload.</div></div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="navigate('dashboard')"><i class="fas fa-arrow-left"></i> Dashboard</button>
        </div>
      </div>
      <div id="reports-body"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading…</p></div></div>
    `;
    try {
      const [tasks, projects, users] = await Promise.all([GET('/tasks'), GET('/projects'), GET('/users')]);
      state.tasks = tasks; state.projects = projects; state.users = users;
      _drawReports();
    } catch(e) { toast(e.message,'error'); }
  }

  function _drawReports() {
    const tasks = state.tasks;
    const todo = tasks.filter(t => t.status === 'TODO').length;
    const inprog = tasks.filter(t => t.status === 'IN_PROGRESS').length;
    const done = tasks.filter(t => t.status === 'DONE').length;
    const high = tasks.filter(t => t.priority === 'HIGH').length;
    const med  = tasks.filter(t => t.priority === 'MEDIUM').length;
    const low  = tasks.filter(t => t.priority === 'LOW').length;
    const total = tasks.length || 1;
    const overdue = tasks.filter(t => t.dueDate && new Date(t.dueDate) < new Date() && t.status !== 'DONE').length;

    // Per-project task counts
    const projRows = state.projects.map(p => {
      const pt = tasks.filter(t => t.project?.id === p.id);
      const pdone = pt.filter(t => t.status === 'DONE').length;
      const pct = pt.length ? Math.round(pdone / pt.length * 100) : 0;
      return `<tr>
        <td><strong>${esc(p.name)}</strong></td>
        <td>${pt.length}</td>
        <td>${pdone}</td>
        <td>${pt.filter(t=>t.status==='IN_PROGRESS').length}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:var(--success);border-radius:99px;transition:width 0.4s;"></div>
            </div>
            <span style="font-size:12px;font-weight:700;color:var(--success);min-width:32px;">${pct}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');

    // Per-member workload
    const memberRows = state.users.map(u => {
      const ut = tasks.filter(t => t.assignedTo?.email === u.email);
      const udone = ut.filter(t => t.status === 'DONE').length;
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:10px;"><div class="user-avatar" style="width:30px;height:30px;font-size:12px;background:var(--primary);">${u.name.charAt(0)}</div><strong>${esc(u.name)}</strong></div></td>
        <td><span class="badge ${u.role==='ADMIN'?'badge-admin':'badge-member'}">${u.role}</span></td>
        <td>${ut.length}</td>
        <td>${udone}</td>
        <td>${ut.filter(t=>t.status==='IN_PROGRESS').length}</td>
      </tr>`;
    }).join('');

    const bar = (val, max, color) => `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
      <div style="flex:1;height:14px;background:var(--border);border-radius:99px;overflow:hidden;">
        <div style="width:${max?Math.round(val/max*100):0}%;height:100%;background:${color};border-radius:99px;transition:width 0.5s;"></div>
      </div>
      <span style="font-size:13px;font-weight:700;min-width:28px;text-align:right;">${val}</span>
    </div>`;

    document.getElementById('reports-body').innerHTML = `
      <div class="stats-grid" style="margin-bottom:24px;">
        ${statCard('fa-tasks','blue',tasks.length,'Total Tasks')}
        ${statCard('fa-check-circle','green',done,'Completed')}
        ${statCard('fa-spinner','amber',inprog,'In Progress')}
        ${statCard('fa-clock','red',overdue,'Overdue')}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
        <div class="card">
          <div class="card-header"><span class="card-title"><i class="fas fa-circle-notch" style="color:var(--primary);margin-right:8px;"></i>Tasks by Status</span></div>
          <div class="card-body">
            <div style="margin-bottom:6px;font-size:13px;color:var(--text-muted);">To Do</div>
            ${bar(todo, total, '#64748b')}
            <div style="margin-bottom:6px;font-size:13px;color:var(--text-muted);">In Progress</div>
            ${bar(inprog, total, '#3b82f6')}
            <div style="margin-bottom:6px;font-size:13px;color:var(--text-muted);">Done</div>
            ${bar(done, total, '#10b981')}
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title"><i class="fas fa-flag" style="color:var(--danger);margin-right:8px;"></i>Tasks by Priority</span></div>
          <div class="card-body">
            <div style="margin-bottom:6px;font-size:13px;color:var(--text-muted);">High</div>
            ${bar(high, total, '#ef4444')}
            <div style="margin-bottom:6px;font-size:13px;color:var(--text-muted);">Medium</div>
            ${bar(med, total, '#f59e0b')}
            <div style="margin-bottom:6px;font-size:13px;color:var(--text-muted);">Low</div>
            ${bar(low, total, '#10b981')}
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:24px;">
        <div class="card-header"><span class="card-title"><i class="fas fa-folder" style="color:var(--primary);margin-right:8px;"></i>Project Progress</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Project</th><th>Total</th><th>Done</th><th>In Progress</th><th>Completion</th></tr></thead>
            <tbody>${projRows || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">No projects yet.</td></tr>'}</tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fas fa-users" style="color:var(--primary);margin-right:8px;"></i>Team Workload</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Member</th><th>Role</th><th>Assigned</th><th>Done</th><th>In Progress</th></tr></thead>
            <tbody>${memberRows || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">No members yet.</td></tr>'}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  // ═══════════════════════════════════════════════════════ MESSAGES
  function renderMessages() {
    const main = document.getElementById('main-content');
    // Load messages from localStorage
    const msgs = JSON.parse(localStorage.getItem('tf_messages') || '[]');

    main.innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Messages</div><div class="page-subtitle">Team announcements and quick notes.</div></div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="navigate('dashboard')"><i class="fas fa-arrow-left"></i> Dashboard</button>
        </div>
      </div>
      <div class="card" style="margin-bottom:24px;">
        <div class="card-header"><span class="card-title"><i class="fas fa-pen" style="color:var(--primary);margin-right:8px;"></i>New Message</span></div>
        <div class="card-body">
          <div class="form-group"><label>Message</label>
            <textarea id="msg-input" rows="3" placeholder="Write a message to your team…" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;outline:none;color:var(--text);background:inherit;"></textarea>
          </div>
          <button class="btn btn-primary" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fas fa-comments" style="color:var(--primary);margin-right:8px;"></i>Team Feed</span></div>
        <div class="card-body" id="msg-feed">
          ${_renderMsgFeed(msgs)}
        </div>
      </div>
    `;
  }

  function _renderMsgFeed(msgs) {
    if (!msgs.length) return `<div class="empty-state" style="padding:40px 20px;"><i class="fas fa-comments"></i><p>No messages yet. Be the first to say something!</p></div>`;
    return msgs.slice().reverse().map(m => `
      <div style="display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);">
        <div class="user-avatar" style="width:38px;height:38px;font-size:14px;flex-shrink:0;background:var(--primary);">${m.author.charAt(0)}</div>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
            <strong style="font-size:14px;">${esc(m.author)}</strong>
            <span style="font-size:12px;color:var(--text-muted);">${m.time}</span>
          </div>
          <div style="font-size:14px;line-height:1.6;">${esc(m.text)}</div>
        </div>
      </div>
    `).join('');
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input?.value.trim();
    if (!text) { toast('Please write a message first.', 'error'); return; }
    const msgs = JSON.parse(localStorage.getItem('tf_messages') || '[]');
    msgs.push({
      author: state.user?.name || 'Unknown',
      text,
      time: new Date().toLocaleString(),
    });
    localStorage.setItem('tf_messages', JSON.stringify(msgs));
    input.value = '';
    document.getElementById('msg-feed').innerHTML = _renderMsgFeed(msgs);
    toast('Message sent!');
  }

  // ═══════════════════════════════════════════════════════ SETTINGS
  function renderSettings() {
    const main = document.getElementById('main-content');
    const u = state.user;
    main.innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Settings</div><div class="page-subtitle">Manage your profile and workspace preferences.</div></div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="navigate('dashboard')"><i class="fas fa-arrow-left"></i> Dashboard</button>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

        <div class="card">
          <div class="card-header"><span class="card-title"><i class="fas fa-user-circle" style="color:var(--primary);margin-right:8px;"></i>Profile</span></div>
          <div class="card-body">
            <div style="display:flex;align-items:center;gap:18px;margin-bottom:24px;">
              <div class="user-avatar" style="width:64px;height:64px;font-size:26px;background:var(--primary);">${u.name.charAt(0)}</div>
              <div>
                <div style="font-size:18px;font-weight:700;">${esc(u.name)}</div>
                <div style="font-size:13px;color:var(--text-muted);">${esc(u.email)}</div>
                <span class="badge ${u.role==='ADMIN'?'badge-admin':'badge-member'}" style="margin-top:6px;">${u.role}</span>
              </div>
            </div>
            <div class="form-group"><label>Display Name</label><input id="set-name" value="${esc(u.name)}" /></div>
            <div class="form-group"><label>Email</label><input value="${esc(u.email)}" disabled style="opacity:0.6;cursor:not-allowed;" /></div>
            <button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> Save Changes</button>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:20px;">
          <div class="card">
            <div class="card-header"><span class="card-title"><i class="fas fa-palette" style="color:var(--primary);margin-right:8px;"></i>Appearance</span></div>
            <div class="card-body">
              <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">Choose your preferred color theme.</p>
              <div style="display:flex;gap:12px;">
                <button class="btn btn-secondary" onclick="setTheme('light')" id="theme-light-btn" style="${state.theme==='light'?'border:2px solid var(--primary);':''}" >
                  <i class="fas fa-sun"></i> Light
                </button>
                <button class="btn btn-secondary" onclick="setTheme('dark')" id="theme-dark-btn" style="${state.theme==='dark'?'border:2px solid var(--primary);':''}">
                  <i class="fas fa-moon"></i> Dark
                </button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><span class="card-title"><i class="fas fa-database" style="color:var(--primary);margin-right:8px;"></i>Data</span></div>
            <div class="card-body">
              <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">Reset all workspace data back to the demo defaults.</p>
              <button class="btn btn-danger" onclick="resetData()"><i class="fas fa-trash-alt"></i> Reset Demo Data</button>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><span class="card-title"><i class="fas fa-info-circle" style="color:var(--primary);margin-right:8px;"></i>About</span></div>
            <div class="card-body">
              <p style="font-size:14px;line-height:1.8;color:var(--text-muted);">
                <strong style="color:var(--text);">TaskFlow</strong> — Team Task Manager<br/>
                Version 1.0.0<br/>
                All data is stored locally in your browser.
              </p>
            </div>
          </div>
        </div>

      </div>
    `;
  }

  function saveProfile() {
    const name = document.getElementById('set-name')?.value.trim();
    if (!name) { toast('Name cannot be empty.', 'error'); return; }
    // Update in-memory user
    state.user.name = name;
    localStorage.setItem('tf_user', JSON.stringify(state.user));
    // Update in data store
    const u = state.data.users.find(x => x.email === state.user.email);
    if (u) { u.name = name; saveData(); }
    // Update sidebar
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-avatar').textContent = name.charAt(0).toUpperCase();
    toast('Profile updated!');
  }

  function setTheme(theme) {
    state.theme = theme;
    applyTheme(theme);
    localStorage.setItem('tf_theme', theme);
    // Refresh settings page to update button highlights
    renderSettings();
  }

  function resetData() {
    if (!confirm('This will reset all projects, tasks, and users to the demo defaults. Continue?')) return;
    localStorage.removeItem('tf_data');
    localStorage.removeItem('tf_messages');
    state.data = loadData();
    state.tasks = [];
    state.projects = [];
    state.users = [];
    toast('Demo data restored!', 'info');
    navigate('dashboard');
  }

  // ═══════════════════════════════════════════════════════ BOOT
  (function init() {
    localStorage.removeItem('tf_data'); // Force reload demo data
    state.data = loadData();
    applyTheme(state.theme);
    if (state.token && state.user) {
      launchApp();
    }
  })();
</script>
</body>
</html>
